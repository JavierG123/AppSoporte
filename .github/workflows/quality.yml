name: quality

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run consolidated quality checks
        run: make quality
